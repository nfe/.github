name: "Bug"
description: "Comportamento incorreto em codigo ja em producao"
body:
  - type: textarea
    id: origem
    attributes:
      label: "Origem"
      description: "Quem solicitou, por qual canal e link/referencia de rastreabilidade"
      placeholder: "> 📌 @solicitante via Slack #canal — https://link-da-thread"
      value: "> 📌 "
    validations:
      required: true

  - type: textarea
    id: contexto
    attributes:
      label: "Contexto"
      description: "O que esta acontecendo de errado? Quando comecou? Qual o impacto?"
    validations:
      required: true

  - type: textarea
    id: objetivo
    attributes:
      label: "Objetivo"
      description: "Qual o comportamento correto esperado apos a correcao?"
    validations:
      required: true

  - type: textarea
    id: escopo-inclui
    attributes:
      label: "Escopo — Inclui"
      description: "O que sera corrigido (bullets)"
      value: |
        -
    validations:
      required: true

  - type: textarea
    id: escopo-nao-inclui
    attributes:
      label: "Escopo — Nao inclui"
      description: "O que fica fora da correcao"
      value: |
        -
    validations:
      required: false

  - type: textarea
    id: criterios-aceitacao
    attributes:
      label: "Criterios de Aceitacao"
      description: "Criterios verificaveis por terceiro sem perguntar nada (checkboxes)"
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: dependencias
    attributes:
      label: "Dependencias"
      description: "Outras issues, sistemas, decisoes pendentes"
      placeholder: "Nenhuma"
    validations:
      required: false

  - type: textarea
    id: referencias
    attributes:
      label: "Referencias"
      description: "Links, logs, screenshots, threads. Minimo 1 entrada."
      value: |
        -
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Classificacao (Project Fields)
        Estes campos serao aplicados no Project "Work — Product & Engineering" durante a triagem.

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "Impacto em producao"
      options:
        - "1 — Producao indisponivel ou corrompendo dados (>= 50% clientes)"
        - "2 — Impacto maior sem workaround viavel"
        - "3 — Impacto moderado com workaround"
        - "4 — Impacto menor, cosmetico ou borda rara"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Urgencia julgada pelo lider da area"
      options:
        - "P0 — Critica (Severity 1, bloqueio total)"
        - "P1 — Alta (Severity 2, proxima iteracao)"
        - "P2 — Media (Severity 3, planejar em 2-3 iteracoes)"
        - "P3 — Baixa (Severity 4, icebox)"
    validations:
      required: true

  - type: dropdown
    id: compliance
    attributes:
      label: "Compliance"
      description: "Este bug tem motivacao regulatoria ou fiscal?"
      options:
        - "Nao"
        - "Vigente — obrigacao legal ja em producao"
        - "<90d — prazo legal em ate 90 dias"
        - ">90d — prazo legal > 90 dias ou data nao publicada"
      default: 0
    validations:
      required: true

  - type: input
    id: deadline
    attributes:
      label: "Deadline"
      description: "Data oficial publicada pelo orgao (AAAA-MM-DD). Deixe vazio se Compliance = Nao."
      placeholder: "2026-07-01"
    validations:
      required: false
