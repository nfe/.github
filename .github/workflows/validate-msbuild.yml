# Validate hybrid .NET solutions on Windows.
# Use this reusable for solutions that include any of:
#   - Service Fabric projects (.sfproj)
#   - .NET Framework class libraries
#   - PFX-signed assemblies (Dynamics plugins, strong-name signing)
#   - packages.config restore alongside PackageReference
# For pure SDK-style PackageReference solutions, prefer validate-dotnet.
name: Validate hybrid .NET solution (MSBuild)

on:
  workflow_call:
    inputs:
      solution:
        description: "Path to the .sln (or .csproj) file to build and test"
        required: true
        type: string
      skipTests:
        description: "Skip the dotnet test step (useful for projects without tests or with Windows-only / SF dependencies)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS) }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Detect packages.config
        id: pkgcfg
        shell: pwsh
        run: |
          $found = (Get-ChildItem -Recurse -File -Filter packages.config | Select-Object -First 1) -ne $null
          "found=$($found.ToString().ToLower())" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Setup NuGet
        if: steps.pkgcfg.outputs.found == 'true'
        uses: NuGet/setup-nuget@v2

      # dotnet restore handles PackageReference (writes obj/project.assets.json).
      # nuget restore is invoked per packages.config — passing the sln
      # would make nuget drive VS Build Tools' MSBuild over the SDK-style
      # projects too, which can't resolve Microsoft.NET.Sdk*. Targeting
      # individual packages.config files avoids that path entirely while
      # still populating <repo>/packages for .sfproj relative imports.
      - name: Restore (dotnet)
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.solution }}"

      - name: Restore (nuget, per packages.config)
        if: steps.pkgcfg.outputs.found == 'true'
        shell: pwsh
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkgDir = Join-Path $env:GITHUB_WORKSPACE 'packages'
          Get-ChildItem -Recurse -File -Filter packages.config | ForEach-Object {
            nuget restore $_.FullName -PackagesDirectory $pkgDir
            if ($LASTEXITCODE -ne 0) { throw "nuget restore failed for $($_.FullName)" }
          }

      # SignAssembly=false bypasses the .NET Core MSBuild guard that
      # rejects PFX signing. PR validation only needs to compile-check;
      # the signed artifact is produced by the dedicated release workflow.
      - name: Build (dotnet msbuild)
        run: dotnet msbuild "${{ inputs.solution }}" -t:Build -p:Configuration=Release -p:SignAssembly=false

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: dotnet test "${{ inputs.solution }}" --no-build --no-restore -c Release --logger "console;verbosity=minimal"
