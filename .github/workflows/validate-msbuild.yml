# Validate hybrid .NET solutions on Windows.
# Use this reusable for solutions that include any of:
#   - Service Fabric projects (.sfproj)
#   - .NET Framework class libraries
#   - PFX-signed assemblies (Dynamics plugins, strong-name signing)
#   - packages.config restore alongside PackageReference
# For pure SDK-style PackageReference solutions, prefer validate-dotnet.
name: Validate hybrid .NET solution (MSBuild)

on:
  workflow_call:
    inputs:
      solution:
        description: "Path to the .sln (or .csproj) file to build and test"
        required: true
        type: string
      skipTests:
        description: "Skip the dotnet test step (useful for projects without tests or with Windows-only / SF dependencies)"
        required: false
        type: boolean
        default: false
      submodules:
        description: "Submodule checkout strategy passed to actions/checkout (false | true | recursive)"
        required: false
        type: string
        default: "false"

jobs:
  validate:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS) }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.submodules }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Detect .nvmrc
        id: nvmrc
        shell: pwsh
        run: |
          $found = (Test-Path .nvmrc).ToString().ToLower()
          "found=$found" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node.js
        if: steps.nvmrc.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # Two restores by design: dotnet handles PackageReference projects
      # (writes obj/project.assets.json), nuget handles packages.config
      # consumers (populates the legacy <repo>/packages folder that
      # .sfproj's relative imports rely on).
      - name: Restore (dotnet)
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.solution }}"

      - name: Restore (nuget)
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nuget restore "${{ inputs.solution }}"

      # SignAssembly=false bypasses the .NET Core MSBuild guard that
      # rejects PFX signing. PR validation only needs to compile-check;
      # the signed artifact is produced by the dedicated release workflow.
      - name: Build (dotnet msbuild)
        run: dotnet msbuild "${{ inputs.solution }}" -t:Build -p:Configuration=Release -p:SignAssembly=false

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: dotnet test "${{ inputs.solution }}" --no-build --no-restore -c Release --logger "console;verbosity=minimal"
