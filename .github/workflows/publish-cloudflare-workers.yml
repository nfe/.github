name: Publish to Cloudflare Workers

on:
  workflow_call:
    inputs:
      workerName:
        description: "Cloudflare Worker name — passed as 'wrangler deploy --name <workerName>' (e.g., 'batch-app-prod'). Overrides whatever is in wrangler.json / wrangler.toml."
        required: true
        type: string
      stage:
        description: "'production' or 'preview'. When 'production', the tag must match '{tagPrefix}{semver}'. Only affects SemVer validation and the PR-comment step; the concurrency group keys on workerName+stage."
        required: false
        type: string
        default: "production"
      nodeVersion:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      packageScope:
        description: "npm scope used to authenticate against GitHub Packages"
        required: false
        type: string
        default: "@nfe"
      buildCommand:
        description: "Command used to build the app before deploying (usually emits static assets under the directory referenced by wrangler.json's 'assets.directory')"
        required: false
        type: string
        default: "npm run build"
      wranglerVersion:
        description: "Version of wrangler to use"
        required: false
        type: string
        default: "3"
      tagPrefix:
        description: "Release tag prefix used to extract the version when stage == 'production' (e.g., 'v' for 'v1.0.0', 'batch-app-v' for 'batch-app-v1.2.3')"
        required: true
        type: string
      installCommand:
        description: "Command used to install dependencies. Use 'npm install' for repos without a lockfile; 'npm ci' otherwise."
        required: false
        type: string
        default: "npm ci"
      cacheDependencies:
        description: "Enable actions/setup-node npm cache. Requires a lockfile. Set to false when the repo has no lockfile (or uses a non-npm lockfile like pnpm)."
        required: false
        type: boolean
        default: true
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
    outputs:
      version:
        description: "Extracted SemVer when stage == 'production', empty otherwise"
        value: ${{ jobs.deploy.outputs.version }}
      deploymentUrl:
        description: "workers.dev URL returned by wrangler"
        value: ${{ jobs.deploy.outputs.deploymentUrl }}

concurrency:
  group: cloudflare-workers-${{ inputs.workerName }}-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX) }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      pull-requests: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      deploymentUrl: ${{ steps.deploy.outputs.deploymentUrl }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        if: ${{ inputs.stage == 'production' && startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#${{ inputs.tagPrefix }}}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version extracted from tag '$GITHUB_REF_NAME' (prefix '${{ inputs.tagPrefix }}'): '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js (with cache)
        if: ${{ inputs.cacheDependencies }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.nodeVersion }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.packageScope }}
          cache: npm

      - name: Setup Node.js (no cache)
        if: ${{ !inputs.cacheDependencies }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.nodeVersion }}
          registry-url: https://npm.pkg.github.com
          scope: ${{ inputs.packageScope }}

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ inputs.installCommand }}

      - name: Build
        run: ${{ inputs.buildCommand }}

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          LOG=$(mktemp)
          npx --yes wrangler@${{ inputs.wranglerVersion }} deploy \
            --name="${{ inputs.workerName }}" 2>&1 | tee "$LOG"
          URL=$(grep -oE 'https://[a-z0-9.-]+\.workers\.dev' "$LOG" | tail -n 1 || true)
          if [[ -n "$URL" ]]; then
            echo "deploymentUrl=$URL" >> "$GITHUB_OUTPUT"
            echo "## Cloudflare Worker deployment" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Worker: \`${{ inputs.workerName }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Stage: \`${{ inputs.stage }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment deployment URL on PR
        if: ${{ inputs.stage == 'preview' && github.event_name == 'pull_request' && steps.deploy.outputs.deploymentUrl != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deploymentUrl }}';
            const worker = '${{ inputs.workerName }}';
            const marker = '<!-- cloudflare-worker-preview:' + worker + ' -->';
            const body = [
              marker,
              '### Cloudflare Worker preview',
              '',
              '- Worker: `' + worker + '`',
              '- URL: ' + url,
              '- Commit: `${{ github.sha }}`',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
