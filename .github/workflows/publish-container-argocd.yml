name: Publish container image and deploy via ArgoCD

on:
  workflow_call:
    inputs:
      projectPath:
        description: "Path to the .csproj or .sln to build (e.g., webapi/webapi.csproj)"
        required: true
        type: string
      imageName:
        description: "Image name under ghcr.io/nfe/ (e.g., dfetech-xml2pdf-api)"
        required: true
        type: string
      tagPrefix:
        description: "Release tag prefix (e.g., 'v' for 'v1.0.0' or 'xml2pdf-v' for scoped tags)"
        required: false
        type: string
        default: "v"
      dockerfile:
        description: "Path to the Dockerfile (relative to repo root)"
        required: true
        type: string
      dockerContext:
        description: "Docker build context directory (relative to repo root)"
        required: true
        type: string
      argocdAppName:
        description: "ArgoCD application name (e.g., xml2pdf-api)"
        required: true
        type: string
      k8sNamespace:
        description: "Target Kubernetes namespace"
        required: true
        type: string
      chartPath:
        description: "Path to the Helm chart within the repo"
        required: false
        type: string
        default: "kubernetes"
      valuesFile:
        description: "Values file name within chartPath"
        required: false
        type: string
        default: "values-production.yaml"
      dotnetBuildArgs:
        description: "Extra args appended to dotnet build (e.g., -p:BuildRPM=true)"
        required: false
        type: string
        default: ""
      preDockerScript:
        description: "Optional shell script (relative to repo root) executed after dotnet build, before docker build. Receives VERSION and BUILD_CONFIG in env."
        required: false
        type: string
        default: ""
    secrets:
      ARGOCD_SERVER_URL:
        required: true
      ARGOCD_AUTH_TOKEN:
        required: true
      ARGOCD_PROJECT:
        required: true
      ARGOCD_APP_NAMESPACE:
        required: true
      ARGOCD_DESTINATION_CLUSTER:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_FULL: ghcr.io/${{ github.repository_owner }}/${{ inputs.imageName }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#${{ inputs.tagPrefix }}}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version extracted from tag '$GITHUB_REF_NAME' (prefix '${{ inputs.tagPrefix }}'): '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.projectPath }}"

      - name: Build
        run: |
          dotnet build "${{ inputs.projectPath }}" \
            --no-restore \
            -c Release \
            /p:Version=${{ steps.version.outputs.version }} \
            /p:Deterministic=true \
            ${{ inputs.dotnetBuildArgs }}

      - name: Run pre-docker script
        if: ${{ inputs.preDockerScript != '' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_CONFIG: Release
        run: bash "${{ inputs.preDockerScript }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerContext }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_FULL }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_FULL }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.release.published_at }}

  deploy:
    needs: build-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.build-and-publish.outputs.version }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Upsert ArgoCD application
        run: |
          argocd app create "${{ inputs.argocdAppName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ secrets.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ secrets.ARGOCD_APP_NAMESPACE }}" \
            --project "${{ secrets.ARGOCD_PROJECT }}" \
            --dest-server "${{ secrets.ARGOCD_DESTINATION_CLUSTER }}" \
            --dest-namespace "${{ inputs.k8sNamespace }}" \
            --repo "${{ github.server_url }}/${{ github.repository }}.git" \
            --path "${{ inputs.chartPath }}" \
            --values "${{ inputs.valuesFile }}" \
            --revision "${{ github.sha }}" \
            --helm-set image.repository=${{ env.IMAGE_FULL }} \
            --helm-set image.tag=${{ env.VERSION }} \
            --sync-policy automated \
            --sync-option Prune=true \
            --sync-option SelfHeal=true \
            --sync-option CreateNamespace=true \
            --upsert \
            --grpc-web

      - name: Wait for sync and health
        run: |
          argocd app wait "${{ inputs.argocdAppName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ secrets.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ secrets.ARGOCD_APP_NAMESPACE }}" \
            --health \
            --sync \
            --timeout 600 \
            --grpc-web
