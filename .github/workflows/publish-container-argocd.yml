name: Deploy container via ArgoCD

on:
  workflow_call:
    inputs:
      appName:
        description: "ArgoCD application name (e.g., xml2pdf-api). Also used as prefix for the GitHub environment '{appName}-{stage}'."
        required: true
        type: string
      stage:
        description: "Deployment stage suffix (prod, staging, homolog). Composed with appName into the GitHub environment '{appName}-{stage}'."
        required: false
        type: string
        default: "prod"
      namespace:
        description: "Target Kubernetes namespace"
        required: true
        type: string
      image:
        description: "Image repository without tag (e.g., ghcr.io/nfe/dfetech-xml2pdf-api)"
        required: true
        type: string
      version:
        description: "Image tag to deploy (SemVer, e.g., 1.0.0)"
        required: true
        type: string
      chartPath:
        description: "Path to the Helm chart within the calling repo"
        required: false
        type: string
        default: "kubernetes"
      valuesFile:
        description: "Values file name within chartPath"
        required: false
        type: string
        default: "values-production.yaml"
      revision:
        description: "Git revision (sha, branch, or tag) for ArgoCD to sync. Defaults to github.sha."
        required: false
        type: string
        default: ""
    secrets:
      ARGOCD_AUTH_TOKEN:
        required: true

concurrency:
  group: argocd-${{ github.repository }}-${{ inputs.appName }}-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.appName }}-${{ inputs.stage }}
    permissions:
      contents: read
    outputs:
      previousImage: ${{ steps.prev.outputs.image }}
      previousTag: ${{ steps.prev.outputs.tag }}
      isNewApp: ${{ steps.prev.outputs.isNew }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Capture current state
        id: prev
        run: |
          APP=$(argocd app get "${{ inputs.appName }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --grpc-web -o json 2>/dev/null || echo '{}')

          if [ "$APP" = '{}' ]; then
            echo "isNew=true" >> "$GITHUB_OUTPUT"
            echo "No existing application found — first deploy."
          else
            echo "isNew=false" >> "$GITHUB_OUTPUT"
            IMAGE=$(echo "$APP" | jq -r '
              .spec.source.helm.parameters[]
              | select(.name == "image.repository") | .value // empty')
            TAG=$(echo "$APP" | jq -r '
              .spec.source.helm.parameters[]
              | select(.name == "image.tag") | .value // empty')
            echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Previous state: $IMAGE:$TAG"
          fi

      - name: Upsert ArgoCD application
        env:
          REVISION: ${{ inputs.revision != '' && inputs.revision || github.sha }}
        run: |
          argocd app create "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --project "${{ vars.ARGOCD_PROJECT }}" \
            --dest-server "${{ vars.ARGOCD_DESTINATION_CLUSTER }}" \
            --dest-namespace "${{ inputs.namespace }}" \
            --repo "${{ github.server_url }}/${{ github.repository }}.git" \
            --path "${{ inputs.chartPath }}" \
            --values "${{ inputs.valuesFile }}" \
            --revision "${REVISION}" \
            --helm-set image.repository=${{ inputs.image }} \
            --helm-set image.tag=${{ inputs.version }} \
            --sync-policy automated \
            --sync-option Prune=true \
            --sync-option SelfHeal=true \
            --sync-option CreateNamespace=true \
            --upsert \
            --grpc-web

      - name: Wait for sync and health
        run: |
          argocd app wait "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --health \
            --sync \
            --timeout 600 \
            --grpc-web

  rollback:
    needs: deploy
    if: |
      always()
      && needs.deploy.result == 'failure'
      && needs.deploy.outputs.isNewApp != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.appName }}-${{ inputs.stage }}
    permissions:
      contents: read
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd

      - name: Revert to previous image
        id: revert
        continue-on-error: true
        run: |
          echo "Rolling back to ${{ needs.deploy.outputs.previousImage }}:${{ needs.deploy.outputs.previousTag }}"
          argocd app set "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --helm-set image.repository=${{ needs.deploy.outputs.previousImage }} \
            --helm-set image.tag=${{ needs.deploy.outputs.previousTag }} \
            --grpc-web

      - name: Wait for rollback health
        if: steps.revert.outcome == 'success'
        continue-on-error: true
        run: |
          argocd app wait "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --health \
            --sync \
            --timeout 600 \
            --grpc-web
