name: Publish container and deploy via ArgoCD

on:
  workflow_call:
    inputs:
      imageName:
        description: "Image name under ghcr.io/<owner>/ (e.g., dfetech-xml2pdf-api)"
        required: true
        type: string
      tagPrefix:
        description: "Release tag prefix used to extract the version (e.g., 'v' for 'v1.0.0', 'xml2pdf-api-v' for 'xml2pdf-api-v1.2.3')"
        required: true
        type: string
      appName:
        description: "ArgoCD application name (e.g., xml2pdf-api). Also used as prefix for the GitHub environment '{appName}-{stage}'."
        required: true
        type: string
      namespace:
        description: "Target Kubernetes namespace"
        required: true
        type: string
      stage:
        description: "Deployment stage suffix (prod, staging, homolog). Composed with appName into the GitHub environment '{appName}-{stage}'."
        required: false
        type: string
        default: "prod"
      dockerfile:
        description: "Path to Dockerfile relative to repo root"
        required: false
        type: string
        default: "Dockerfile"
      dockerContext:
        description: "Docker build context relative to repo root"
        required: false
        type: string
        default: "."
      extraBuildArgs:
        description: "Additional --build-arg entries, one per line (key=value)"
        required: false
        type: string
        default: ""
      extraLabels:
        description: "Additional OCI labels, one per line (key=value)"
        required: false
        type: string
        default: ""
      chartPath:
        description: "Path to the Helm chart within the calling repo"
        required: false
        type: string
        default: "kubernetes"
      valuesFile:
        description: "Values file name within chartPath"
        required: false
        type: string
        default: "values-production.yaml"
      revision:
        description: "Git revision (sha, branch, or tag) for ArgoCD to sync. Defaults to github.sha."
        required: false
        type: string
        default: ""
    secrets:
      ARGOCD_AUTH_TOKEN:
        required: true

concurrency:
  group: argocd-${{ github.repository }}-${{ inputs.appName }}-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ env.IMAGE }}
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.imageName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#${{ inputs.tagPrefix }}}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version extracted from tag '$GITHUB_REF_NAME' (prefix '${{ inputs.tagPrefix }}'): '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerContext }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            ${{ inputs.extraBuildArgs }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            ${{ inputs.extraLabels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.appName }}-${{ inputs.stage }}
    permissions:
      contents: read
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Upsert ArgoCD application
        env:
          REVISION: ${{ inputs.revision != '' && inputs.revision || github.sha }}
        run: |
          argocd app create "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --project "${{ vars.ARGOCD_PROJECT }}" \
            --dest-server "${{ vars.ARGOCD_DESTINATION_CLUSTER }}" \
            --dest-namespace "${{ inputs.namespace }}" \
            --repo "${{ github.server_url }}/${{ github.repository }}.git" \
            --path "${{ inputs.chartPath }}" \
            --values "${{ inputs.valuesFile }}" \
            --revision "${REVISION}" \
            --helm-set image.repository=${{ needs.build.outputs.image }} \
            --helm-set image.tag=${{ needs.build.outputs.version }} \
            --sync-policy automated \
            --sync-option Prune=true \
            --sync-option SelfHeal=true \
            --sync-option CreateNamespace=true \
            --upsert \
            --grpc-web

      - name: Wait for sync and health
        run: |
          argocd app wait "${{ inputs.appName }}" \
            --auth-token "${{ secrets.ARGOCD_AUTH_TOKEN }}" \
            --server "${{ vars.ARGOCD_SERVER_URL }}" \
            --app-namespace "${{ vars.ARGOCD_APP_NAMESPACE }}" \
            --health \
            --sync \
            --timeout 600 \
            --grpc-web
