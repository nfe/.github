name: Build and push container to GHCR

on:
  workflow_call:
    inputs:
      imageName:
        description: "Image name under ghcr.io/<owner>/ (e.g., dfetech-xml2pdf-api)"
        required: true
        type: string
      tagPrefix:
        description: "Release tag prefix used to extract the version (e.g., 'v' for 'v1.0.0', 'foundation-v' for 'foundation-v1.2.3')"
        required: false
        type: string
        default: "v"
      dockerfile:
        description: "Path to Dockerfile relative to repo root"
        required: false
        type: string
        default: "Dockerfile"
      dockerContext:
        description: "Docker build context relative to repo root"
        required: false
        type: string
        default: "."
      dockerfileTarget:
        description: "Target stage in a multi-stage Dockerfile (passed to docker/build-push-action `target`). Empty = no target."
        required: false
        type: string
        default: ""
      buildArgs:
        description: "Extra build args for docker build, one `KEY=VALUE` per line (passed as `build-args`). Empty = none."
        required: false
        type: string
        default: ""
    outputs:
      version:
        description: "Extracted SemVer (no prefix)"
        value: ${{ jobs.build.outputs.version }}
      image:
        description: "Full image repository without tag (e.g., ghcr.io/nfe/dfetech-xml2pdf-api)"
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ env.IMAGE }}
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/${{ inputs.imageName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#${{ inputs.tagPrefix }}}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid version extracted from tag '$GITHUB_REF_NAME' (prefix '${{ inputs.tagPrefix }}'): '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.dockerContext }}
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.dockerfileTarget }}
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GITHUB_USERNAME=${{ github.actor }}
            ${{ inputs.buildArgs }}
          secrets: |
            github_packages_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
