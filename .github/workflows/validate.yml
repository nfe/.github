name: Validate

on:
  workflow_call:
    inputs:
      stacks:
        description: "Comma-separated stacks (e.g., 'dotnet' or 'dotnet,node'). Leave empty to auto-detect (used by Required Workflow invocations)."
        required: false
        type: string
        default: ""
      dotnet-solution:
        description: "(dotnet) Path to the .sln file. Auto-detects the first .sln if empty."
        required: false
        type: string
      node-version:
        description: "(node) Node.js version"
        required: false
        type: string
        default: "20"
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.d.outputs.stacks }}
      dotnet-solution: ${{ steps.d.outputs.dotnet-solution }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        shell: bash
        run: |
          stacks="${{ inputs.stacks }}"
          if [[ -z "$stacks" ]]; then
            detected=""
            if ls *.sln 2>/dev/null | grep -q .; then
              detected="dotnet"
            fi
            if [[ -f package.json ]]; then
              detected="${detected:+$detected,}node"
            fi
            stacks="$detected"
          fi
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

          sln="${{ inputs.dotnet-solution }}"
          if [[ -z "$sln" && "$stacks" == *dotnet* ]]; then
            sln=$(ls *.sln 2>/dev/null | head -1)
          fi
          echo "dotnet-solution=$sln" >> "$GITHUB_OUTPUT"

          echo "::notice::Validating stacks: ${stacks:-(none detected)}"

  dotnet:
    needs: detect
    if: contains(needs.detect.outputs.stacks, 'dotnet')
    permissions:
      contents: read
      packages: read
    uses: nfe/.github/.github/workflows/validate-dotnet.yml@main
    with:
      solution: ${{ needs.detect.outputs.dotnet-solution }}

  node:
    needs: detect
    if: contains(needs.detect.outputs.stacks, 'node')
    permissions:
      contents: read
      packages: read
    uses: nfe/.github/.github/workflows/validate-node.yml@main
    with:
      node-version: ${{ inputs.node-version }}

  summary:
    needs: [detect, dotnet, node]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          fail=0
          for r in "${{ needs.dotnet.result }}" "${{ needs.node.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then fail=1; fi
          done
          if [[ "$fail" -eq 0 ]]; then
            echo "All stack validations passed"
          else
            echo "One or more stack validations failed"
            exit 1
          fi
