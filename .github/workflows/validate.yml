name: Validate

on:
  workflow_call:
    inputs:
      stacks:
        description: "Comma-separated stacks to validate (e.g., 'dotnet' or 'dotnet,node')"
        required: true
        type: string
      dotnet-solution:
        description: "(dotnet) Path to the .sln file"
        required: false
        type: string
      node-version:
        description: "(node) Node.js version"
        required: false
        type: string
        default: "20"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- .NET ---
      - name: Setup .NET SDK
        if: contains(inputs.stacks, 'dotnet')
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore (.NET)
        if: contains(inputs.stacks, 'dotnet')
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.dotnet-solution }}"

      - name: Build (.NET)
        if: contains(inputs.stacks, 'dotnet')
        run: dotnet build "${{ inputs.dotnet-solution }}" --no-restore -c Release

      - name: Test (.NET)
        if: contains(inputs.stacks, 'dotnet')
        run: dotnet test "${{ inputs.dotnet-solution }}" --no-build -c Release --logger "console;verbosity=minimal"

      # --- Node ---
      - name: Setup Node.js
        if: contains(inputs.stacks, 'node')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies (Node)
        if: contains(inputs.stacks, 'node')
        run: npm ci

      - name: Lint (Node)
        if: contains(inputs.stacks, 'node')
        run: npm run lint --if-present

      - name: Build (Node)
        if: contains(inputs.stacks, 'node')
        run: npm run build --if-present

      - name: Test (Node)
        if: contains(inputs.stacks, 'node')
        run: npm test --if-present
