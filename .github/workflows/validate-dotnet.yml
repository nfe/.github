name: Validate .NET solution

on:
  workflow_call:
    inputs:
      solution:
        description: "Path to the .sln (or .csproj) file to build and test"
        required: true
        type: string
      os:
        description: "Which self-hosted runner to use: 'linux' (default) or 'windows' (for projects with Windows-only MSBuild SDKs like Microsoft.VisualStudio.Azure.Fabric.MSBuild)."
        required: false
        type: string
        default: "linux"
      skipTests:
        description: "Skip the dotnet test step (useful for projects without tests or with Windows-only / SF dependencies)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ${{ inputs.os == 'windows' && vars.RUNNER_WINDOWS || vars.RUNNER_LINUX }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate os input
        if: ${{ inputs.os != 'linux' && inputs.os != 'windows' }}
        run: |
          echo "::error::Invalid 'os' input '${{ inputs.os }}' — must be 'linux' or 'windows'."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Solutions that include a Service Fabric .sfproj need the legacy
      # nuget CLI to restore the sfproj's packages.config
      # (Microsoft.VisualStudio.Azure.Fabric.MSBuild). Pure PackageReference
      # solutions use dotnet restore — faster, cross-platform, and doesn't
      # need mono on Linux. We detect by grepping the .sln file.
      - name: Detect sfproj in solution
        id: detect
        shell: bash
        run: |
          if grep -q '\.sfproj' "${{ inputs.solution }}" 2>/dev/null; then
            echo "has_sfproj=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sfproj=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup NuGet CLI
        if: steps.detect.outputs.has_sfproj == 'true'
        uses: NuGet/setup-nuget@v2

      - name: Restore (nuget CLI)
        if: steps.detect.outputs.has_sfproj == 'true'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nuget restore "${{ inputs.solution }}"

      - name: Restore (dotnet)
        if: steps.detect.outputs.has_sfproj != 'true'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.solution }}"

      - name: Build
        run: dotnet build "${{ inputs.solution }}" --no-restore -c Release

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: dotnet test "${{ inputs.solution }}" --no-build -c Release --logger "console;verbosity=minimal"
