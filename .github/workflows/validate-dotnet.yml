name: Validate .NET solution

on:
  workflow_call:
    inputs:
      solution:
        description: "Path to the .sln (or .csproj) file to build and test"
        required: true
        type: string
      runner:
        description: "Runner labels (JSON-array formatted string). Empty defaults to vars.RUNNER_LINUX."
        required: false
        type: string
        default: ""
      skipTests:
        description: "Skip the dotnet test step (useful for projects without tests or with Windows-only / SF dependencies)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ${{ fromJSON(inputs.runner != '' && inputs.runner || vars.RUNNER_LINUX) }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Hybrid SF solutions need both: nuget restore (packages.config) +
      # dotnet restore (SDK-style PackageReference). Detect .sfproj to gate
      # the nuget step.
      - name: Detect sfproj in solution
        id: detect
        shell: bash
        run: |
          if grep -q '\.sfproj' "${{ inputs.solution }}" 2>/dev/null; then
            echo "has_sfproj=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_sfproj=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup NuGet CLI
        if: steps.detect.outputs.has_sfproj == 'true'
        uses: NuGet/setup-nuget@v2

      - name: Restore (nuget CLI)
        if: steps.detect.outputs.has_sfproj == 'true'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nuget restore "${{ inputs.solution }}"

      - name: Restore (dotnet)
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.solution }}"

      - name: Build
        run: dotnet build "${{ inputs.solution }}" --no-restore -c Release

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: dotnet test "${{ inputs.solution }}" --no-build -c Release --logger "console;verbosity=minimal"
