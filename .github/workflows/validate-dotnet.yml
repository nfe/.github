name: Validate .NET solution

on:
  workflow_call:
    inputs:
      solution:
        description: "Path to the .sln (or .csproj) file to build and test"
        required: true
        type: string
      runner:
        description: "Runner label to use (for example, ubuntu-latest, windows-latest, or a self-hosted runner label)"
        required: false
        type: string
        default: "ubuntu-latest"
      skipTests:
        description: "Skip the dotnet test step (useful for projects without tests or with Windows-only / SF dependencies)"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Windows runners need the legacy nuget CLI to handle Service Fabric
      # sfproj's packages.config (Microsoft.VisualStudio.Azure.Fabric.MSBuild).
      # Non-Windows runners use dotnet restore — setup-nuget on Linux doesn't
      # expose a `nuget` command in PATH, and pure-PackageReference solutions
      # don't need it anyway.
      # Revisit this split once Service Fabric is no longer in use anywhere
      # in the org. See nfe/ai-governance#3.
      - name: Setup NuGet CLI
        if: contains(inputs.runner, 'windows')
        uses: NuGet/setup-nuget@v2

      - name: Restore (nuget CLI)
        if: contains(inputs.runner, 'windows')
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nuget restore "${{ inputs.solution }}"

      - name: Restore (dotnet)
        if: "!contains(inputs.runner, 'windows')"
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore "${{ inputs.solution }}"

      - name: Build
        run: dotnet build "${{ inputs.solution }}" --no-restore -c Release

      - name: Test
        if: ${{ !inputs.skipTests }}
        run: dotnet test "${{ inputs.solution }}" --no-build -c Release --logger "console;verbosity=minimal"
